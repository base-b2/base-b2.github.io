<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Number Generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe,#43e97b);
    background-size:400% 400%;
    animation:bg 15s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    width:420px;
    max-width:95%;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:12px;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:8px;
    border:1px solid #ccc;
}

.checkbox{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:15px;
}

.checkbox input{
    width:auto;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2196f3;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1976d2;
}

.result{
    margin-top:25px;
    text-align:center;
    font-size:42px;
    font-weight:bold;
    color:#1565c0;
}

.history{
    margin-top:20px;
    max-height:150px;
    overflow:auto;
    background:#f4f4f4;
    padding:10px;
    border-radius:10px;
}

.history h3{
    margin-bottom:10px;
}
</style>

</head>
<body>

<div class="container">

<h1>🎲 Random Number Generator</h1>

<label>Minimum</label>
<input type="number" id="min" value="1">

<label>Maximum</label>
<input type="number" id="max" value="100">

<label>Typ</label>
<select id="type">
<option value="int">Ganze Zahl</option>
<option value="float">Dezimalzahl</option>
</select>

<label>Nachkommastellen</label>
<input type="number" id="decimals" value="2" min="0" max="10">

<div class="checkbox">
<input type="checkbox" id="unique">
<label for="unique">Keine Wiederholungen (nur Ganzzahlen)</label>
</div>

<button onclick="generate()">Zahl erzeugen</button>

<div class="result" id="result">-</div>

<div class="history">
<h3>Verlauf</h3>
<div id="history"></div>
</div>

</div>

<script>

let used=[];

function generate(){

    let min=Number(document.getElementById("min").value);
    let max=Number(document.getElementById("max").value);
    let type=document.getElementById("type").value;
    let decimals=Number(document.getElementById("decimals").value);
    let unique=document.getElementById("unique").checked;

    if(max<=min){
        alert("Maximum muss größer als Minimum sein.");
        return;
    }

    let number;

    if(type==="int"){

        if(unique){

            if(used.length>=max-min+1){
                alert("Alle Zahlen wurden bereits erzeugt.");
                return;
            }

            do{
                number=Math.floor(Math.random()*(max-min+1))+min;
            }while(used.includes(number));

            used.push(number);

        }else{
            number=Math.floor(Math.random()*(max-min+1))+min;
        }

    }else{
        number=(Math.random()*(max-min)+min).toFixed(decimals);
    }

    document.getElementById("result").textContent=number;

    let history=document.getElementById("history");
    history.innerHTML="<div>"+number+"</div>"+history.innerHTML;

}

</script>

</body>
</html>
